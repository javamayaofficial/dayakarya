name: Deploy FastPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-fastpanel-production
  cancel-in-progress: false

jobs:
  phpunit:
    name: PHPUnit Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, intl, zip, sqlite3, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testsuite Feature

  deploy:
    name: Deploy to FastPanel
    runs-on: ubuntu-latest
    needs: phpunit
    steps:
      - name: Jalankan deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          fingerprint: ${{ secrets.SSH_HOST_FINGERPRINT }}
          script_stop: true
          command_timeout: 30m
          script: |
            export APP_DIR="${{ secrets.APP_DIR }}"
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            export PHP_BIN="${{ secrets.PHP_BIN }}"
            export COMPOSER_BIN="${{ secrets.COMPOSER_BIN }}"
            export RUN_MIGRATIONS="${{ secrets.RUN_MIGRATIONS }}"
            export RUN_STORAGE_LINK="${{ secrets.RUN_STORAGE_LINK }}"
            export RESTART_QUEUE="${{ secrets.RESTART_QUEUE }}"
            export RUN_FILAMENT_ASSETS="${{ secrets.RUN_FILAMENT_ASSETS }}"
            export RUN_SMOKE_CHECKS="${{ secrets.RUN_SMOKE_CHECKS }}"
            export APP_URL_PUBLIC="${{ secrets.APP_URL_PUBLIC }}"

            cd "$APP_DIR"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            chmod +x scripts/deploy-fastpanel.sh
            bash scripts/deploy-fastpanel.sh
